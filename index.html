<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>বাংলা নিউজ</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f1f1f1;
}

header {
  background: green;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  padding: 20px;
}

.news {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.news img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h1>📰 বাংলা নিউজ</h1>
</header>

<div class="container">লোড হচ্ছে...</div>

<script>
const apiKey = "ed172b054e7946960b0a66991e41de9f";

const url = "https://gnews.io/api/v4/search?q=bangladesh&lang=en&max=10&token=" + apiKey;

fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url))
.then(res => res.json())
.then(data => {
  const newsData = JSON.parse(data.contents);

  let container = document.querySelector(".container");
  container.innerHTML = "";

  newsData.articles.forEach(article => {
    let div = document.createElement("div");
    div.className = "news";

    div.innerHTML = `
      <img src="${article.image}" alt="">
      <h2>${article.title}</h2>
      <p>${article.description || "বিস্তারিত নেই"}</p>
      <a href="${article.url}" target="_blank">👉 বিস্তারিত পড়ুন</a>
    `;

    container.appendChild(div);
  });
})
.catch(err => {
  document.querySelector(".container").innerHTML =
    "❌ Error: " + err.message;
});
</script>

</body>
</html>
